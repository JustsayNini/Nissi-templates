    <main>
        <section id="contactme-main">

            <div>
                <h2>CONTACT ME</h2>
            </div>


            <div>
                <div class="contactme-form">
                    <form action="">
                     <div class="contact-input">
                        <label for="name">I'd love to know who this message is from</label><br>
                        <input type="text" id="name" name="name" placeholder="Your name here" required>
                     </div>
                        <br>
                     <div class="contact-input">
                        <label for="email">And I also need a way to contact you if I'm going to respond... </label><br>
                        <input type="email" id="email" name="email" placeholder="Your email here" required>
                     </div>
                        <br>
                     <div class="contact-input">
                        <label for="message">So, what did you want to tell me?</label><br>
                        <textarea id="message" placeholder="Your message here..."></textarea>
                     </div>
                    </form>
                </div>

                <div class="contactme-social-media">

                    <a href="https://www.tiktok.com/@a.for.ink" target="_blank">
                        <img src="img/tik-tok.png" alt="TikTok Logo">
                    </a>


                    <a href="https://www.youtube.com/@A_for_Ink" target="_blank">
                        <img src="img/youtube-circle.png" alt="YouTube Logo">
                    </a>


                    <a href="https://aforink.substack.com" target="_blank">
                        <img src="img/Substack.png" alt="Substack Logo">
                    </a>


                    <a href="https://pin.it/46A929IIb" target="_blank">
                        <img src="img/pinterest.png" alt="Pinterest Logo">
                    </a>


                    <a href="https://www.linkedin.com/in/nissi-lossala" target="_blank">
                        <img src="img/linkedin.png" alt="LinkedIn Logo">
                    </a>


                </div>
            </div>

        </section>
    </main>
