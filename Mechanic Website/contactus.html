<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TYRED</title>
        <link rel="icon" type="image/x-icon" href="img/favicon.ico">
        <link rel="stylesheet" href="./styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Jura:wght@300..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>

    <body>
        <header>

            <div class="header">

                <div class="title-header">
                    <h1 class="black-ops-one-regular"><a href="index.html">TYRED</a></h1>
                </div>
                <div class="navbar">
                    <nav>
                        <ul>
                            
                            <li><a href="index.html">Homepage</a></li>
                            <li><a href="about.html">About Us</a></li>
                            <li><a href="contactus.html">Contact Us</a></li>
                            
                        </ul>
                    </nav>
                </div>

            </div>

        </header>

        <main>
            <div class="main-contactus">
                <h2 class="jura">CONTACT US!</h2>

                <div class="contactus-form montserrat">
                    <div class="front-form">
                        <form>

                            <label for="name">Your Full Name: </label><br>
                            <input type="text" id="name" name="name" placeholder="e.g. Jane Doe"><br><br>
                        
                            <label for="email"> Your Email: </label><br>
                            <input type="email" id="email" name="email" placeholder="e.g. janedoe@email.com"><br><br>
                            

                            <label for="message">What message do you want to send to us?</label><br>
                            <textarea name="message" id="message" placeholder="Your message here..."></textarea><br><br>
                                
                            <input type="submit" id="submit-button" value="SEND">
                        </form>
                    </div>
                </div>
            </div>
        </main>

        <footer>

            <div class="footer montserrat">
                <div class="copyright">&copy; TYRED, 2026</div>
                <div class="contact-details"> <p>Call: 011 234 5678<br>
Email: tyredmechanics@email.com</p></div>
                
            </div>

        </footer>

    </body>
</html>
